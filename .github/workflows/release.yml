name: release

# Cut prebuilt binaries for every platform whenever a version tag is pushed, so users can install
# without a Rust toolchain. Tag with:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create the GitHub Release first, so the parallel build jobs have something to upload to.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the release for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --repo "$REPO" --title "$TAG" --notes "Prebuilt mission binaries for $TAG."

  binaries:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and upload the mission binaries
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: mission,mission-mcp
          target: ${{ matrix.target }}
          archive: mission-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
